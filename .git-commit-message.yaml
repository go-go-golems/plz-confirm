title: "🫳 server: disable expiry on touch"
description: |
  Add `POST /api/requests/{id}/touch` so the UI can permanently disable expiry
  auto-completion for a request after first interaction, using `touched_at` and
  `expiry_disabled` fields on `UIRequest`.

  Tests:
  - buf lint .
  - golangci-lint run -v
  - go test ./... -count=1
  - pnpm -C agent-ui-system run check
