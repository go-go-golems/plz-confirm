title: "⏱️ server: auto-complete expired requests"
description: |
  Change `expiresAt` handling so the server auto-completes pending requests when
  they expire, generating a safe default output and marking it via
  `comment=AUTO_TIMEOUT`.

  Tests:
  - buf lint .
  - golangci-lint run -v
  - go test ./... -count=1
  - pnpm -C agent-ui-system run check
