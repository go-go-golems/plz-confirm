title: "✨ metadata: attach request provenance to UIRequest"
description: |
  Add `UIRequest.metadata` (proto) and populate it on request creation with best-effort
  provenance data (cwd + process info + Linux parent chain). Preserve it through the
  store, enrich on the server with `remoteAddr`/`userAgent`, and surface a compact
  label in the UI history.

  Tests:
  - make ci (pass)
