title: "⏱️  server: enforce request expiresAt"
description: |
  Add an authoritative server-side expiry loop: pending requests transition to
  `status=timeout` once `expiresAt` passes, are unblocked for waiters, and the
  update is broadcast to the session WebSocket clients.

  Tests:
  - go test ./... -count=1
  - pnpm -C agent-ui-system run check
