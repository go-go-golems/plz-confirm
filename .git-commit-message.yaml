title: "👷 ci: run go generate before golangci-lint"
description: |
  The Go server embeds frontend assets via `go:embed`, which requires generated files to exist at typecheck time.
  Update the `golangci-lint` GitHub Actions workflow to install pnpm deps and run `go generate ./internal/server`
  before `golangci-lint-action@v7` runs.

  Tests:
  - go test ./... -count=1 (pass)
