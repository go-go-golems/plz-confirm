title: "🐛 server: dev disk fallback for SPA assets"
description: |
  Fix CI/typecheck failures caused by `go:embed` when `internal/server/embed/public` is not present in fresh checkouts.

  Changes:
  - Restore `-tags embed` gated embedding for production builds
  - In default builds, serve static assets from disk if `internal/server/embed/public/index.html` exists
  - Make the static-serving test use an in-memory FS (no dependency on generated assets)
  - Re-align `Makefile` and docs to use `-tags embed` for embedded builds

  Tests:
  - go test ./... -count=1 (pass)
