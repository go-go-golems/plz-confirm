syntax = "proto3";

package plz_confirm.v1;

option go_package = "github.com/go-go-golems/plz-confirm/proto/generated/go/plz_confirm/v1";

import "plz_confirm/v1/widgets.proto";
import "google/protobuf/struct.proto";

message ProcessInfo {
  int64 pid = 1;
  optional int64 ppid = 2;
  optional string comm = 3;
  repeated string argv = 4;
}

message RequestMetadata {
  optional string cwd = 1;
  optional ProcessInfo self = 2;
  repeated ProcessInfo parents = 3;
  optional string remote_addr = 4;
  optional string user_agent = 5;
}

// RequestStatus enum
enum RequestStatus {
  // NOTE: Enum value NAMES are chosen to preserve the existing JSON wire contract
  // when using protojson (it serializes enums as their names).
  request_status_unspecified = 0;
  pending = 1;
  completed = 2;
  timeout = 3;
  error = 4;
}

// WidgetType enum
enum WidgetType {
  // NOTE: Enum value NAMES are chosen to preserve the existing JSON wire contract
  // when using protojson (it serializes enums as their names).
  widget_type_unspecified = 0;
  confirm = 1;
  select = 2;
  form = 3;
  upload = 4;
  table = 5;
  image = 6;
  script = 7;
}

// UIRequest - main request/response envelope
message UIRequest {
  string id = 1;
  WidgetType type = 2;
  string session_id = 3;
  
  // Widget-specific input (oneof for type safety)
  oneof input {
    ConfirmInput confirm_input = 4;
    SelectInput select_input = 5;
    FormInput form_input = 6;
    UploadInput upload_input = 7;
    TableInput table_input = 8;
    ImageInput image_input = 9;
    ScriptInput script_input = 24;
  }
  
  // Widget-specific output (oneof for type safety)
  oneof output {
    ConfirmOutput confirm_output = 10;
    SelectOutput select_output = 11;
    FormOutput form_output = 12;
    UploadOutput upload_output = 13;
    TableOutput table_output = 14;
    ImageOutput image_output = 15;
    ScriptOutput script_output = 25;
  }
  
  RequestStatus status = 16;
  string created_at = 17;        // RFC3339Nano timestamp
  optional string completed_at = 18;
  string expires_at = 19;       // RFC3339Nano timestamp
  optional string error = 20;
  optional RequestMetadata metadata = 21;
  optional string touched_at = 22; // RFC3339Nano timestamp (first UI interaction)
  optional bool expiry_disabled = 23; // If true, server will not auto-complete on expires_at
  optional google.protobuf.Struct script_state = 26;
  optional ScriptView script_view = 27;
  optional ScriptDescribe script_describe = 28;
}
