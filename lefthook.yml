pre-commit:
  commands:
    lint:
      glob: '**/*.go'
      run: make lint
    test:
      glob: '**/*.go'
      run: make test
    buf-lint:
      glob: 'proto/**/*.proto'
      run: make buf-lint
    frontend-check:
      glob: 'agent-ui-system/**'
      run: make frontend-check
  parallel: true

pre-push:
  commands:
    release:
      run: make goreleaser
    lint:
      run: make lint
    test:
      run: make test
    buf-lint:
      run: make buf-lint
    frontend-check:
      run: make frontend-check
  parallel: true
